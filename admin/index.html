<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Pulse | Video Studio</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    /* ড্যাশবোর্ডকে প্রিমিয়াম করার স্টাইল */
    .nc-app-container { background-color: #f8fafc !important; }
    .nc-sidebar-container { background: #1e293b !important; box-shadow: 4px 0 15px rgba(0,0,0,0.1) !important; }
    .nc-sidebar-link-active { background: #334155 !important; border-left: 4px solid #38bdf8 !important; }
    .nc-header-container { background: white !important; border-bottom: 1px solid #e2e8f0 !important; }
    
    /* ইনপুট বক্স এবং কার্ডের লুক */
    .nc-entryEditor-controlPane { 
        background: white !important; 
        border-radius: 16px !important; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.05) !important; 
        padding: 40px !important; 
        max-width: 900px !important; 
        margin: 20px auto !important;
    }
    
    /* বাটনের লুক */
    .nc-uiButton-button { 
        border-radius: 8px !important; 
        font-weight: 600 !important; 
        transition: all 0.3s ease !important;
    }
    .nc-uiButton-button-primary { background-color: #0ea5e9 !important; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
